<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gênero</h2>
    <a class="btn btn-secondary" routerLink="/generos">Voltar</a>
</div>

@if (mensagemErro) {
<div class="alert alert-danger">{{ mensagemErro }}</div>
}

<form [formGroup]="formGenero" (ngSubmit)="salvar()">
    <div class="row">
        <div class="col-12 mb-3">
            <label class="form-label">Descrição</label>
            <input type="text" class="form-control" formControlName="descricao">

            @if (validarCampo('descricao', 'required')) {
                <div class="text-danger small">A descrição é obrigatória.</div>
            }
            @if (validarCampo('descricao', 'minlength')) {
                <div class="text-danger small">A descrição deve ter no mínimo 2 caracteres.</div>
            }
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-success" [disabled]="formGenero.invalid">Salvar</button>
    </div>
</form>
